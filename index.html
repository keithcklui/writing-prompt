<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1c1e;
      --ink-light: #6e6e73;
      --ink-faint: #aeaeb2;
      --paper: #faf9f6;
      --paper-warm: #f2ede4;
      --accent: #c8873a;
      --accent-light: #f0e0c8;
      --rule: #e5e0d8;
      --serif: 'Lora', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 2rem;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--ink);
      letter-spacing: .03em;
    }
    .nav-logo em { color: var(--accent); font-style: italic; }
    .nav-tabs { display: flex; gap: .2rem; }
    .nav-tab {
      padding: .4rem .9rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .02em;
    }
    .nav-tab:hover { background: var(--paper-warm); color: var(--ink); }
    .nav-tab.active { background: var(--accent-light); color: var(--accent); }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Write page ── */
    .write-page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .date-line {
      font-size: .78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--ink-faint);
      margin-bottom: 2rem;
    }

    /* Decorative rule */
    .ornament {
      text-align: center;
      margin: 1.5rem 0;
      color: var(--accent);
      font-size: 1.1rem;
      letter-spacing: .4em;
      opacity: .6;
    }

    .prompt-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--accent);
      margin-bottom: .7rem;
    }

    .prompt-text {
      font-family: var(--serif);
      font-size: 1.35rem;
      line-height: 1.65;
      color: var(--ink);
      font-style: italic;
      margin-bottom: .4rem;
    }

    .prompt-refresh {
      background: none;
      border: none;
      font-size: .78rem;
      color: var(--ink-faint);
      cursor: pointer;
      font-family: var(--sans);
      padding: 0;
      letter-spacing: .04em;
      transition: color .15s;
    }
    .prompt-refresh:hover { color: var(--accent); }

    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2rem 0;
    }

    .write-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--ink-faint);
      margin-bottom: .8rem;
    }

    .write-area {
      width: 100%;
      min-height: 340px;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--serif);
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--ink);
      background: transparent;
      caret-color: var(--accent);
    }
    .write-area::placeholder { color: var(--ink-faint); font-style: italic; }

    /* lined paper effect */
    .paper-lines {
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent calc(1.9em * 1.05 - 1px),
        var(--rule) calc(1.9em * 1.05 - 1px),
        var(--rule) calc(1.9em * 1.05)
      );
      background-size: 100% calc(1.9em * 1.05);
      padding-bottom: 1px;
    }

    .write-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
    }
    .word-count { font-size: .78rem; color: var(--ink-faint); }
    .btn-save {
      padding: .5rem 1.4rem;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .03em;
      transition: opacity .15s;
    }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .4; cursor: default; }

    .save-note {
      font-size: .78rem;
      color: var(--accent);
      margin-top: .5rem;
      text-align: right;
      min-height: 1em;
      font-style: italic;
    }

    /* ── Archive page ── */
    .archive-page {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }
    .archive-page h2 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: .4rem;
    }
    .archive-page .sub {
      font-size: .83rem;
      color: var(--ink-light);
      margin-bottom: 2.5rem;
    }

    .archive-empty {
      text-align: center;
      color: var(--ink-faint);
      font-style: italic;
      font-family: var(--serif);
      font-size: 1rem;
      margin-top: 4rem;
    }

    .entry-list { display: flex; flex-direction: column; gap: 1px; }

    .entry-card {
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      margin-bottom: .8rem;
      transition: box-shadow .15s;
    }
    .entry-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }

    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.2rem;
      cursor: pointer;
      gap: 1rem;
    }
    .entry-header-left { flex: 1; min-width: 0; }
    .entry-date-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--accent);
      margin-bottom: .2rem;
    }
    .entry-prompt-preview {
      font-family: var(--serif);
      font-size: .92rem;
      font-style: italic;
      color: var(--ink-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: .8rem;
      flex-shrink: 0;
    }
    .entry-words {
      font-size: .75rem;
      color: var(--ink-faint);
      white-space: nowrap;
    }
    .entry-chevron {
      font-size: .8rem;
      color: var(--ink-faint);
      transition: transform .2s;
    }
    .entry-card.open .entry-chevron { transform: rotate(180deg); }

    .entry-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--rule); }
    .entry-card.open .entry-body { display: block; }

    .entry-body-prompt {
      font-family: var(--serif);
      font-size: .9rem;
      font-style: italic;
      color: var(--ink-light);
      margin: .9rem 0 .8rem;
      padding-bottom: .8rem;
      border-bottom: 1px solid var(--rule);
    }
    .entry-body-text {
      font-family: var(--serif);
      font-size: .97rem;
      line-height: 1.85;
      color: var(--ink);
      white-space: pre-wrap;
      margin-bottom: 1rem;
    }
    .entry-actions { display: flex; gap: .5rem; justify-content: flex-end; }
    .btn-entry {
      padding: .3rem .8rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: transparent;
      font-size: .78rem;
      color: var(--ink-light);
      cursor: pointer;
      font-family: var(--sans);
      transition: all .15s;
    }
    .btn-entry:hover { border-color: var(--ink-light); color: var(--ink); }
    .btn-entry.del:hover { border-color: #e05252; color: #e05252; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">daily <em>writing</em></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="write">Write</button>
    <button class="nav-tab" data-page="archive">Archive</button>
  </div>
</nav>

<!-- Write page -->
<div class="page active" id="page-write">
  <div class="write-page">
    <div class="date-line" id="today-label"></div>

    <div class="prompt-label">Today's Prompt</div>
    <div class="prompt-text" id="prompt-text"></div>
    <button class="prompt-refresh" id="refresh-prompt">↺ different prompt</button>

    <div class="ornament">· · ·</div>

    <div class="write-label">Your response</div>
    <div class="paper-lines">
      <textarea class="write-area" id="write-area" placeholder="Begin writing here…" spellcheck="true"></textarea>
    </div>

    <div class="write-footer">
      <span class="word-count" id="word-count">0 words</span>
      <button class="btn-save" id="save-btn">Save entry</button>
    </div>
    <div class="save-note" id="save-note"></div>
  </div>
</div>

<!-- Archive page -->
<div class="page" id="page-archive">
  <div class="archive-page">
    <h2>Your Writing</h2>
    <div class="sub" id="archive-sub"></div>
    <div class="entry-list" id="entry-list"></div>
  </div>
</div>

<script>
  const PROMPTS = [
    "Describe a place you've never been but feel you belong.",
    "Write about the last time you changed your mind about something important.",
    "A door you've never opened — what's behind it?",
    "What does silence sound like where you are right now?",
    "Write a letter to the version of yourself from five years ago.",
    "Describe the feeling of almost remembering something.",
    "What would you do if you had one day with no obligations?",
    "Write about an ordinary object as if it has a secret history.",
    "The conversation you keep replaying in your head.",
    "Describe your ideal morning in detail.",
    "What does home mean to you?",
    "Write about a small kindness you witnessed recently.",
    "If your life were a season, which one would it be and why?",
    "The thing you're most afraid to admit you want.",
    "Write about a sound that takes you back somewhere.",
    "Describe a moment when time seemed to slow down.",
    "What are you still learning about yourself?",
    "Write about someone who taught you something without trying to.",
    "The last thing that made you laugh until it hurt.",
    "If you could live inside any piece of art, which would it be?",
    "Describe a habit you have that you've never questioned.",
    "Write about what you wanted to be when you were a child.",
    "The most interesting conversation you had this week.",
    "What do you wish more people understood about you?",
    "Write about a choice that led you somewhere unexpected.",
    "Describe the texture of a feeling you can't name.",
    "What would you tell a stranger on a long train ride?",
    "Write about the last thing that surprised you.",
    "A ritual you keep, even if no one else understands it.",
    "What does courage look like in small, everyday moments?",
    "Describe a relationship that changed you.",
    "Write about something you've outgrown but still miss.",
    "The most beautiful thing you saw this week.",
    "Write about the version of yourself you're still becoming.",
    "What do you carry with you everywhere, and why?",
    "Describe a moment of unexpected connection with a stranger.",
    "Write about a time you surprised yourself.",
    "The question you keep asking but never fully answer.",
    "What does it feel like to start over?",
    "Write about the last time you felt completely at peace.",
    "A story hidden in the lines of your hands.",
    "What do you return to, again and again?",
    "Describe the city or town you live in as a first-time visitor.",
    "Write about a dream you still remember clearly.",
    "What would you do differently, knowing what you know now?",
    "The thing you make time for even when you're too busy.",
    "Write about the gap between who you are and who you want to be.",
    "Describe a meal that meant more than food.",
    "What are you grateful for that you rarely say out loud?",
    "Write about a moment when you felt completely yourself.",
  ];

  const todayKey = () => new Date().toISOString().slice(0, 10);

  // Prompt selection — daily seed
  function dailyPromptIndex() {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    return seed % PROMPTS.length;
  }

  let promptIndex = dailyPromptIndex();
  let usedIndices = [promptIndex];

  function getPrompt(idx) { return PROMPTS[idx % PROMPTS.length]; }

  // Entries stored as array in localStorage
  function loadEntries() {
    return JSON.parse(localStorage.getItem('writing-entries') || '[]');
  }
  function saveEntries(entries) {
    localStorage.setItem('writing-entries', JSON.stringify(entries));
  }

  // Draft persistence
  function draftKey() { return 'draft-' + todayKey(); }
  function loadDraft() {
    return JSON.parse(localStorage.getItem(draftKey()) || '{}');
  }
  function saveDraft(text, promptIdx) {
    localStorage.setItem(draftKey(), JSON.stringify({ text, promptIdx }));
  }

  // Date display
  function formatDate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function wordCount(text) {
    return text.trim() ? text.trim().split(/\s+/).length : 0;
  }

  // ── Write page init ──
  const promptEl = document.getElementById('prompt-text');
  const writeArea = document.getElementById('write-area');
  const wordCountEl = document.getElementById('word-count');
  const saveBtn = document.getElementById('save-btn');
  const saveNote = document.getElementById('save-note');
  document.getElementById('today-label').textContent = formatDate(todayKey());

  // Load draft
  const draft = loadDraft();
  if (draft.text) { writeArea.value = draft.text; promptIndex = draft.promptIdx ?? promptIndex; }
  promptEl.textContent = '"' + getPrompt(promptIndex) + '"';
  wordCountEl.textContent = wordCount(writeArea.value) + ' words';

  // Check if today's entry already saved
  function todaySaved() {
    return loadEntries().some(e => e.date === todayKey());
  }
  if (todaySaved()) {
    saveBtn.textContent = 'Update entry';
    saveNote.textContent = 'You've already saved an entry today.';
  }

  writeArea.addEventListener('input', () => {
    const wc = wordCount(writeArea.value);
    wordCountEl.textContent = wc + ' words';
    saveDraft(writeArea.value, promptIndex);
    saveNote.textContent = '';
  });

  document.getElementById('refresh-prompt').addEventListener('click', () => {
    let next;
    do { next = Math.floor(Math.random() * PROMPTS.length); } while (usedIndices.includes(next) && usedIndices.length < PROMPTS.length);
    usedIndices.push(next);
    promptIndex = next;
    promptEl.textContent = '"' + getPrompt(promptIndex) + '"';
    saveDraft(writeArea.value, promptIndex);
  });

  saveBtn.addEventListener('click', () => {
    const text = writeArea.value.trim();
    if (!text) { saveNote.textContent = 'Write something first.'; return; }

    const entries = loadEntries();
    const existing = entries.findIndex(e => e.date === todayKey());
    const entry = {
      date: todayKey(),
      prompt: getPrompt(promptIndex),
      text,
      words: wordCount(text),
      savedAt: new Date().toISOString(),
    };

    if (existing >= 0) entries[existing] = entry;
    else entries.unshift(entry);

    saveEntries(entries);
    localStorage.removeItem(draftKey());
    saveBtn.textContent = 'Update entry';
    saveNote.textContent = 'Saved ✓';
    setTimeout(() => saveNote.textContent = '', 2500);
    renderArchive();
  });

  // ── Archive ──
  function renderArchive() {
    const entries = loadEntries();
    const sub = document.getElementById('archive-sub');
    const list = document.getElementById('entry-list');
    const total = entries.reduce((s, e) => s + (e.words || 0), 0);
    sub.textContent = `${entries.length} entr${entries.length !== 1 ? 'ies' : 'y'} · ${total.toLocaleString()} words total`;

    if (entries.length === 0) {
      list.innerHTML = '<div class="archive-empty">Your writing will appear here once you save your first entry.</div>';
      return;
    }

    list.innerHTML = entries.map((e, i) => `
      <div class="entry-card" data-idx="${i}">
        <div class="entry-header">
          <div class="entry-header-left">
            <div class="entry-date-label">${formatDate(e.date)}</div>
            <div class="entry-prompt-preview">${escHtml(e.prompt)}</div>
          </div>
          <div class="entry-meta">
            <span class="entry-words">${e.words} words</span>
            <span class="entry-chevron">▾</span>
          </div>
        </div>
        <div class="entry-body">
          <div class="entry-body-prompt">"${escHtml(e.prompt)}"</div>
          <div class="entry-body-text">${escHtml(e.text)}</div>
          <div class="entry-actions">
            <button class="btn-entry del" data-date="${e.date}">Delete</button>
          </div>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.entry-header').forEach(h => {
      h.addEventListener('click', () => {
        h.closest('.entry-card').classList.toggle('open');
      });
    });

    list.querySelectorAll('.btn-entry.del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const date = btn.dataset.date;
        if (!confirm('Delete this entry?')) return;
        const updated = loadEntries().filter(e => e.date !== date);
        saveEntries(updated);
        renderArchive();
        if (date === todayKey()) { saveBtn.textContent = 'Save entry'; saveNote.textContent = ''; }
      });
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Nav ──
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + tab.dataset.page).classList.add('active');
      if (tab.dataset.page === 'archive') renderArchive();
    });
  });

  renderArchive();
</script>
</body>
</html>
